<!DOCTYPE html>
<html>

<head>

    <meta charset="utf-8">
    <title>Windstations</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            margin: 10px;
        }

        h2 {
            text-align: center;
        }

        .stations-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 20px;
        }

        .station {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 10px;
            background: white;
        }

        h3 {
            text-align: center;
            margin-top: 0;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            font-size: 15px;
        }

        th, td {
            padding: 6px;
            border: 1px solid #ddd;
            text-align: center;
        }

        th {
            background: #f4f4f4;
        }

        .green { background: #bff2bf; }
        .yellow { background: #fff59d; }
        .orange { background: #ffcc80; }
        .red { background: #ff8a80; }
        .darkred {
            background: #b71c1c;
            color: white;
        }

        .dir {
            color: black;
        }

    </style>

</head>

<body>

<h2>WINDSTATIONS</h2>

<div class="stations-grid">

{% for station in stations %}

<div class="station">

    <h3>{{ station.name }}</h3>

    <table>

        <tr>
            <th>Hora</th>
            <th>Media</th>
            <th>Racha</th>
            <th>Dir</th>
        </tr>

        {% for row in station.data %}

        <tr>

            <td>{{ row.time }}</td>

            <td class="{{ row.speed_color }}">
                {{ "%.1f"|format(row.speed) }}
            </td>

            <td class="{{ row.gust_color }}">
                {{ "%.1f"|format(row.gust) }}
            </td>

            <td class="{{ row.dir_color }} dir">
                {{ row.direction }}°
            </td>

        </tr>

        {% endfor %}

    </table>

</div>

{% endfor %}

</div>

</body>
</html>
