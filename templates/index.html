<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Wind</title>

        <style>
        body {
            font-family: Arial, sans-serif;
            margin: 10px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            max-width: 500px;
            margin: auto;
            font-size: 14px;
        }

        th, td {
            padding: 6px 4px;
            border: 1px solid #ddd;
            text-align: center;
        }

        th {
            background: #f4f4f4;
        }

        .green { background: #bff2bf; }
        .yellow { background: #fff59d; }
        .orange { background: #ffcc80; }
        .red { background: #ff8a80; }
        .darkred { background: #b71c1c; color: white; }

        .dir {
            color: black;
        }
    </style>
</head>

<body>

<h3 style="text-align:center;">Viento Punta Galea</h3>

<table>
    <tr>
        <th>Hora</th>
        <th>Media</th>
        <th>Racha</th>
        <th>Dir</th>
    </tr>

    {% for row in data %}
    <tr>

        <td>{{ row.time }}</td>

        <td class="{{ row.speed_color }}">
            {{ "%.1f"|format(row.speed) }}
        </td>

        <td class="{{ row.gust_color }}">
            {{ "%.1f"|format(row.gust) }}
        </td>

        <td class="{{ row.dir_color }} dir">
            {{ row.direction }}°
        </td>

    </tr>
    {% endfor %}

</table>

</body>
</html>
