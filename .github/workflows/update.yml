name: Generate Windstations Web

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt

      - name: Generar HTML
        run: |
          python generate.py

      - name: Guardar cambios
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add index.html
          git commit -m "Update wind data" || echo "No changes"

          git push